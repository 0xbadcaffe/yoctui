name: CI
on: [push, pull_request]
permissions: { contents: read }
concurrency: { group: yoctui-${{ github.workflow }}-${{ github.ref }}, cancel-in-progress: true }
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: python3 -m pip install ruff mypy pytest
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo test --workspace --all-features
      - run: ./scripts/test-terminal.sh
      - run: ./scripts/test-cli.sh
      - run: python3 -m unittest discover bridge/tests
      - run: ruff check bridge
      - run: ruff format --check bridge
      - run: mypy bridge
      - run: pytest bridge/tests
